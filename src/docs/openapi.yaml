openapi: 3.1.0

info:
  title: Library Management System (LMS) API
  version: 1.0.0

servers:
  - url: http://localhost:3000
    description: Local development server
  - url: https://your-render-app.onrender.com
    description: Production server

tags:
  - name: Auth
    description: Authentication endpoints
  - name: Users
    description: User-related endpoints
  - name: Books
    description: Book-related endpoints
  - name: Reviews
    description: Review-related endpoints
  - name: Loans
    description: Loan-related endpoints
  - name: Monitoring
    description: Operational endpoints, such as health checks

paths:
  /api/auth/signup:
    post:
      summary: Register a new user
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name:
                  type: string
                email:
                  type: string
                password:
                  type: string
      responses:
        '201':
          description: User created successfully
        '409':
          description: Email already exists

  /api/auth/login:
    post:
      summary: Login user and receive JWT token
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Login successful
        '401':
          description: Invalid credentials
  /api/users:
    get:
      summary: Get all users
      tags:
        - Users
      responses:
        '200':
          description: OK

    post:
      summary: Create a new user
      tags:
        - Users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '201':
          description: User created

  /api/users/{id}:
    get:
      summary: Get user by ID
      tags:
        - Users
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: OK
        '404':
          description: User not found

    put:
      summary: Update user
      tags:
        - Users
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Updated

    delete:
      summary: Delete user
      tags:
        - Users
      responses:
        '200':
          description: Deleted
  /api/books:
    get:
      summary: Get all books
      tags:
        - Books
      responses:
        '200':
          description: OK

    post:
      summary: Create a new book
      tags:
        - Books
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, author]
              properties:
                title:
                  type: string
                author:
                  type: string
                publishDate:
                  type: string
                  format: date
                pageAmount:
                  type: integer
                conditionReport:
                  type: string
      responses:
        '201':
          description: Book created
  /api/reviews:
    get:
      summary: Get all reviews
      tags:
        - Reviews
      responses:
        '200':
          description: OK

    post:
      summary: Create review
      tags:
        - Reviews
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [bookId, rating]
              properties:
                bookId:
                  type: integer
                rating:
                  type: integer
                reviewText:
                  type: string
      responses:
        '201':
          description: Review created

  /api/reviews/{id}:
    get:
      summary: Get review by ID
      tags:
        - Reviews
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: OK

    put:
      summary: Update review
      tags:
        - Reviews
      responses:
        '200':
          description: Updated

    delete:
      summary: Delete review
      tags:
        - Reviews
      responses:
        '200':
          description: Deleted
  /api/loans:
    get:
      summary: Get all loans
      tags:
        - Loans
      responses:
        '200':
          description: OK

    post:
      summary: Create a loan
      tags:
        - Loans
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId, bookId, loanDate, dueDate]
              properties:
                userId:
                  type: integer
                bookId:
                  type: integer
                loanDate:
                  type: string
                  format: date
                dueDate:
                  type: string
                  format: date
      responses:
        '201':
          description: Loan created
  /health:
    get:
      summary: Health Check
      description: Used by Render to verify API is running
      tags:
        - Monitoring
      responses:
        '200':
          description: API running
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - bearerAuth: []